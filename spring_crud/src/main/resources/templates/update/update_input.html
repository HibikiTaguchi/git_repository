<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout_4block :: layout(~{::body/content()})}">
<head>
<meta charset="UTF-8">
<title>会員変更入力 | シェアードショップ</title>
</head>
<body th:object="${userForm}" class="admin user_update_input_admin">
		<h3>社員変更入力画面</h3>
		<!-- class名とボタンの変更は行なわないこと。-->
    <thdiv class="update">
      <form th:action="@{/update/check}" method="post">
        <!-- エラーメッセージの出力 -->
        <p>
          <span th:each="error:${#fields.detailedErrors()}">
            <span th:text="${error.message}"></span><br />
          </span>
        </p>

        <div class="form">
          <div class="label">パスワード：</div>
          <div class="input">
            <input type="password" th:name="*{empPass}" />
          </div>
        </div>
        <div class="form">
          <div class="label">社員名：</div>
          <div class="input">
            <input type="text" th:name="*{empName}" />
          </div>
        </div>
        <div class="form">
          <div class="label">性別：</div>
          <div class="input">
            <input type="radio" th:field="*{gender}" value="1" th:selected="*{gender == 1}"/>男性&nbsp;
            <input type="radio" th:field="*{gender}" value="2" th:selected="*{gender == 2}"/>女性
          </div>
        </div>
        <div class="form">
          <div class="label">住所：</div>
          <div class="input">
            <input type="text" th:field="*{address}" />
          </div>
        </div>
        <div class="form">
          <div class="label">生年月日：</div>
          <div class="input">
            <input type="text" th:field="*{birthday}" />(YYYY/MM/DD)
          </div>
        </div>
        <div class="form">
          <div class="label">権限：</div>
          <div class="input">
            <input type="radio" th:field="*{authority}" value="1" th:selected="*{authority == 1}"/>一般&nbsp;&nbsp;
            <input type="radio" th:field="*{authority}" value="2" th:selected="*{authority == 2}"/>管理者
          </div>
        </div>
        </form>
<!--		</th:brock>-->
		
        <div class="form">
          <div class="label">部署名：</div>
          <div class="input">
            <select th:field="*{deptId}">
              <option value="1" th:selected="*{deptId == 1}">営業部</option>
              <option value="2" th:selected="*{deptId == 2}">経理部</option>
              <option value="3" th:selected="*{deptId == 3}">総務部</option>
            </select>
          </div>
        </div>
    
        <div class="form">
          <div class="label"></div>
          <div class="input">
            <input type="hidden" th:field="*{empId}" />
            <input type="submit" value="変更" />
          </div>
        </div>
      </form>
      <form th:action="@{/list}">
        <div class="form">
          <div class="label"></div>
          <div class="input">
            <input type="submit" value="戻る" />
          </div>
        </div>
      </form>
    </div>
</body>
<html/>
