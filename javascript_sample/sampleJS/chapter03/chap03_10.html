<!DOCTYPE html>
<html>
 <head>
  <meta charset="UTF-8">
  <title>サンプルコード3-10</title>
 </head>
 <body>
   <h2 id="title">文字色を変更</h2>
   <hr>
   <input type="button" value="赤文字" onclick="change('red')">
   <input type="button" value="黒文字" onclick="change('black')">
   <input type="button" value="白抜き" onclick="change('white')">
  <script>
    function change(type) {
      const st = document.getElementById("title").style ;
      switch(type){
        case "red":
          st.color="red"; st.backgroundColor="white";
          break;
        case "black":
          st.color = "black"; st.backgroundColor = "white";
          break;
        case "white":
          st.color = "white"; st.backgroundColor = "black";
          break;
      }
    }
  </script>
 </body>
</html>
