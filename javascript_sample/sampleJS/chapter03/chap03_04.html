<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>サンプルコード3-4</title>
</head>

<body>
  <h2>要素のテキストを表示</h2>
  <p id="hello">こんにちは！</p>
  <script>
    const p = document.getElementById("hello");
    const text = p.innerHTML;
    alert("本文のテキストは「" + text + "」です。");
  </script>
</body>

</html>
